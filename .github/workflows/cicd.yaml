name: CI-CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'k8s/deployment.yaml'
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        persist-credentials: true

    - name: Set image tag
      run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

    - name: Login to DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build Docker image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/fastapi-app:${{ env.IMAGE_TAG }} .

    - name: Push Docker image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/fastapi-app:${{ env.IMAGE_TAG }}

    # 🔥 Update deployment.yaml
    - name: Update deployment.yaml image
      run: |
        sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/fastapi-app:${{ env.IMAGE_TAG }}|g" k8s/deployment.yaml

    # 🔁 Commit & push changes
    - name: Commit and push changes
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add k8s/deployment.yaml
        git commit -m "Update image to ${{ env.IMAGE_TAG }}"
        git push